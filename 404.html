<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ursoninhos | Redirecionando...</title>
  <meta name="robots" content="noindex">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #120c08;
      color: #f4dfbf;
      font: 600 18px/1.5 Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .redirect-box {
      max-width: 420px;
      padding: 24px 28px;
      border: 1px solid rgba(231, 176, 92, 0.35);
      border-radius: 24px;
      background: rgba(42, 27, 18, 0.92);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }
    a {
      color: #e7b05c;
    }
  </style>
</head>
<body>
  <div class="redirect-box">
    <p>Redirecionando para o produto...</p>
    <p><a href="/index.html">Voltar para a loja</a></p>
  </div>
  <script>
    (function () {
      var match = window.location.pathname.match(/^\/(\d{4})\/?$/);
      if (match) {
        window.location.replace('/produto.html?id=' + encodeURIComponent(match[1]));
        return;
      }
      window.location.replace('/index.html');
    })();
  </script>
</body>
</html>
